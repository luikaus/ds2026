proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=VIDEO_CACHE:10m
                 max_size=2g inactive=30m use_temp_path=off;

upstream minio {
    server minio:9567;
}

server {
    listen 80;

    location ^~ /video/ {
        # Auto-append master.m3u8 to asked URI
        rewrite ^/video/([^/.]+)/?$ /videos/$1/master.m3u8 break;

        proxy_pass http://minio/videos/;
        proxy_set_header Host $host;

        # Cache settings
        proxy_cache VIDEO_CACHE;
        proxy_cache_key "$host$request_uri";
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_force_ranges on;

        # Return cache hit/miss
        add_header X-Cache-Status $upstream_cache_status;

        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
        }

        add_header Access-Control-Allow-Origin '*';
        add_header Access-Control-Allow-Methods 'GET, OPTIONS';
    }

    location ^~ /thumbnail/ {
        # Auto-append thumbnail.jpg to asked URI
        rewrite ^/thumbnail/([^/.]+)/?$ /videos/$1/thumbnail.jpg break;

        proxy_pass http://minio/videos/;
        proxy_set_header Host $host;

        # Cache settings
        proxy_cache VIDEO_CACHE;
        proxy_cache_valid 200 7d;

        # Return cache hit/miss
        add_header X-Cache-Status $upstream_cache_status;
        add_header Access-Control-Allow-Origin '*';
        add_header Access-Control-Allow-Methods 'GET, OPTIONS';
    }

    # Cache rules by file type
    location ~* \.m3u8$ {
        proxy_cache_valid 200 1m;
    }

    location ~* \.ts$ {
        proxy_cache_valid 200 2h;
    }
}