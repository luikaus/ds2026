
# Edge Node Configuration



proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=VIDEO_CACHE:10m
                 max_size=2g inactive=30m use_temp_path=off;

upstream minio {
    server minio:9567;
}

server {
    listen 80;

    #  Video streaming 
    location ^~ /video/ {
        # Mirror every request to analytics-server (non-blocking, fire-and-forget)
        mirror /analytics_mirror;
        mirror_request_body off;

        # Auto-append master.m3u8 to asked URI
        rewrite ^/video/([^/.]+)/?$ /videos/$1/master.m3u8 break;

        proxy_pass http://minio/videos/;
        proxy_set_header Host $host;

        # Cache settings
        proxy_cache VIDEO_CACHE;
        proxy_cache_key "$host$request_uri";
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_force_ranges on;

        # Expose cache status in response header
        add_header X-Cache-Status $upstream_cache_status;

        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
        }

        add_header Access-Control-Allow-Origin '*';
        add_header Access-Control-Allow-Methods 'GET, OPTIONS';
    }

    # ── Thumbnail
    location ^~ /thumbnail/ {
        mirror /analytics_mirror;
        mirror_request_body off;

        rewrite ^/thumbnail/([^/.]+)/?$ /videos/$1/thumbnail.jpg break;

        proxy_pass http://minio/videos/;
        proxy_set_header Host $host;

        proxy_cache VIDEO_CACHE;
        proxy_cache_valid 200 7d;

        add_header X-Cache-Status $upstream_cache_status;
        add_header Access-Control-Allow-Origin '*';
        add_header Access-Control-Allow-Methods 'GET, OPTIONS';
    }

    # ── Cache rules by file type 
    location ~* \.m3u8$ {
        proxy_cache_valid 200 1m;
    }

    location ~* \.ts$ {
        proxy_cache_valid 200 2h;
    }

    #  Analytics mirror endpoint
    # NGINX mirrors each request here without blocking the main response.
    # This sends a lightweight event to the analytics-server.
    location /analytics_mirror {
        internal;

        proxy_pass http://analytics-server:5001/event/nginx;

        # Don't forward the original body (mirror_request_body off)
        proxy_set_header Content-Length "";
        proxy_set_header Content-Type "application/json";

        # Pass metadata as headers — analytics-server reads these
        proxy_set_header X-Original-URI  $request_uri;
        proxy_set_header X-Cache-Status  $upstream_cache_status;
        proxy_set_header X-Edge-ID       $hostname;
        proxy_set_header X-Client-IP     $remote_addr;

        # Fire and forget — don't wait for analytics response
        proxy_read_timeout 1s;
        proxy_connect_timeout 1s;
    }
}
