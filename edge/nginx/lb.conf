upstream api {
    server core_server:5000;
}

upstream cdn {
    server edge_node_1:80;
    server edge_node_2:80;
}

server {
    listen 80;

    # Video gallery/main page
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Core server api
    location /api/ {
        proxy_pass http://api/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Edge nodes (CDN)
    location /video/ {
        proxy_pass http://cdn;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Some HLS settings
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
    }
}