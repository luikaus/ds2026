upstream core_server {
    server core-server:5000;
}

upstream cdn {
    ip_hash; # Sticky routing better here for the same viewer
    server edge-node-1:80;
    server edge-node-2:80;
}

upstream client {
    server client:80;
}

server {
    listen 80;

    # Client
    location / {
        proxy_pass http://client/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Upload page
    location /upload {
        client_max_body_size 500M;

        # Increase timeouts so Nginx doesn't kill the connection during a slow upload
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;

        proxy_pass http://core_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Core server api
    location /videos {
        proxy_pass http://core_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Edge nodes (CDN)
    location /video/ {
        proxy_pass http://cdn;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Some HLS settings
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
        tcp_nodelay on;
    }

    location /thumbnail/ {
        proxy_pass http://cdn;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_buffering off;
        tcp_nodelay on;
    }
}